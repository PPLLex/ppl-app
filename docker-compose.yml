version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ppl-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ppl_app
    ports:
      - '5432:5432'
    volumes:
      - ppl_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ppl_app']
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (for Bull job queue — future use)
  redis:
    image: redis:7-alpine
    container_name: ppl-redis
    ports:
      - '6379:6379'
    volumes:
      - ppl_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ppl_postgres_data:
  ppl_redis_data:
